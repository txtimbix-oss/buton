<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Бутон · Цветочная мастерская · СПб</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,500&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="buton.css" rel="stylesheet" />
<style>
.wrap{padding-top:30px;}
/* hero */
.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:stretch;margin-bottom:18px;}
@media(max-width:920px){.hero{grid-template-columns:1fr;gap:24px;}}
.hero-l{display:flex;flex-direction:column;justify-content:center;}
.hero .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--green-soft);font-weight:600;margin-bottom:18px;}
.hero h1{font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(40px,5vw,62px);line-height:1.02;letter-spacing:-.02em;}
.hero h1 em{font-style:italic;color:var(--clay);}
.hero .lead{color:var(--ink-soft);font-size:17px;margin-top:18px;max-width:42ch;line-height:1.5;}
.hero .cta{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;}
.hero .stats{display:flex;gap:30px;margin-top:34px;flex-wrap:wrap;}
.hero .stats .s .v{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;}
.hero .stats .s .k{font-size:12.5px;color:var(--ink-faint);margin-top:1px;}
.hero .stats .s .v .star{color:var(--clay);font-size:20px;}
/* hero media card */
.hero-r{position:relative;}
.hero-media{position:relative;height:100%;min-height:440px;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow-lg);}
.hero-badge{position:absolute;top:18px;left:18px;display:inline-flex;align-items:center;gap:8px;background:oklch(1 0 0 / .9);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:30px;padding:8px 14px;font-size:13px;font-weight:600;z-index:2;}
.hero-badge .dotpulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 oklch(0.345 0.045 152 / .5)}70%{box-shadow:0 0 0 9px oklch(0.345 0.045 152 / 0)}100%{box-shadow:0 0 0 0 oklch(0.345 0.045 152 / 0)}}
.hero-mini{position:absolute;left:16px;right:16px;bottom:16px;background:oklch(0.99 0.006 84 / .94);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:12px;padding:13px;display:flex;align-items:center;gap:13px;z-index:2;box-shadow:var(--shadow);}
.hero-mini .hm-t{flex:1;}
.hero-mini .hm-t .tag{margin-bottom:5px;}
.hero-mini .hm-t .nm{font-weight:600;font-size:15px;}
.hero-mini .hm-t .cm{font-size:12px;color:var(--ink-faint);}
.hero-mini .hm-p{text-align:right;}
.hero-mini .hm-p .pp{font-weight:700;font-size:17px;}
.hero-mini .hm-add{width:42px;height:42px;border-radius:10px;background:var(--green);color:#fff;display:grid;place-items:center;flex:none;}
.hero-mini .hm-add:hover{background:oklch(0.31 0.045 152);}

/* timer strip */
.timer{display:flex;align-items:center;justify-content:center;gap:14px 18px;background:linear-gradient(100deg, oklch(0.95 0.035 55), oklch(0.93 0.045 30));color:oklch(0.42 0.08 40);border:1px solid oklch(0.85 0.06 45);border-left:4px solid var(--clay);border-radius:var(--r);padding:15px 22px;margin:30px 0;flex-wrap:wrap;text-align:center;}
.timer .tt{font-size:15px;font-weight:500;color:oklch(0.5 0.07 45);}
.timer .tt b{color:var(--clay);font-weight:700;}
.timer .tclock{display:inline-flex;gap:5px;align-items:center;font-variant-numeric:tabular-nums;}
.timer .seg{background:var(--clay);color:#fff;border-radius:7px;padding:5px 9px;font-weight:700;font-size:16px;min-width:38px;display:inline-block;text-align:center;}

/* occasions */
.occas{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
@media(max-width:920px){.occas{grid-template-columns:repeat(2,1fr);}}
.occ{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:1/1.15;border:1px solid var(--line);box-shadow:var(--shadow);text-decoration:none;display:block;transition:.16s;}
.occ:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.occ .oc-grad{position:absolute;inset:0;background:linear-gradient(to top, oklch(0.2 0.02 60 / .62), oklch(0.2 0.02 60 / 0) 55%);z-index:1;}
.occ .oc-t{position:absolute;left:14px;bottom:13px;right:12px;z-index:2;color:#fff;}
.occ .oc-t .on{font-weight:600;font-size:16px;}
.occ .oc-t .oq{font-size:12px;opacity:.85;}

/* section block spacing */
.s-block{margin-top:64px;}

/* constructor promo */
.promo{display:grid;grid-template-columns:1fr 1fr;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--card);min-height:300px;}
@media(max-width:760px){.promo{grid-template-columns:1fr;}}
.promo .pr-txt{padding:44px;display:flex;flex-direction:column;justify-content:center;}
.promo .pr-txt .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--green-soft);font-weight:600;margin-bottom:14px;}
.promo .pr-txt h3{font-family:'Playfair Display',serif;font-weight:500;font-size:32px;letter-spacing:-.01em;line-height:1.08;}
.promo .pr-txt p{color:var(--ink-soft);margin:14px 0 24px;max-width:36ch;}
.promo .pr-media{position:relative;min-height:280px;}

/* loyalty */
.loyal-block{background:oklch(0.31 0.025 150);color:oklch(0.92 0.015 90);border-radius:var(--r);padding:44px;}
.loyal-block .lb-top{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:30px;}
.loyal-block h2{font-family:'Playfair Display',serif;font-weight:500;font-size:34px;color:#fff;letter-spacing:-.01em;}
.loyal-block .lb-top p{color:oklch(0.78 0.015 90);margin-top:8px;max-width:46ch;}
.tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:760px){.tiers{grid-template-columns:1fr;}}
.tier{background:oklch(1 0 0 / .06);border:1px solid oklch(1 0 0 / .12);border-radius:12px;padding:22px;}
.tier.gold{background:oklch(0.62 0.11 47 / .16);border-color:oklch(0.62 0.11 47 / .5);}
.tier .tr-n{font-size:13px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;color:oklch(0.78 0.04 90);}
.tier.gold .tr-n{color:var(--clay);}
.tier .tr-c{font-family:'Playfair Display',serif;font-size:40px;font-weight:600;color:#fff;margin:6px 0 2px;}
.tier .tr-d{font-size:13.5px;color:oklch(0.78 0.015 90);}
.tier .tr-th{font-size:12.5px;color:oklch(0.66 0.015 90);margin-top:14px;padding-top:14px;border-top:1px solid oklch(1 0 0 / .12);}

/* reviews marquee */
.marq{overflow:hidden;position:relative;}
.marq::before,.marq::after{content:"";position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none;}
.marq::before{left:0;background:linear-gradient(90deg,var(--paper),transparent);}
.marq::after{right:0;background:linear-gradient(270deg,var(--paper),transparent);}
.marq-track{display:flex;gap:16px;width:max-content;animation:scroll 46s linear infinite;}
.marq:hover .marq-track{animation-play-state:paused;}
@keyframes scroll{to{transform:translateX(-50%);}}
.rcard{width:340px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);flex:none;}
.rcard .rh{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
.rcard .av{width:36px;height:36px;border-radius:50%;background:var(--green-wash);color:var(--green);display:grid;place-items:center;font-weight:700;}
.rcard .rn{font-weight:600;font-size:13.5px;}
.rcard .rs{margin-left:auto;color:var(--clay);font-size:11px;}
.rcard p{font-size:13.5px;color:var(--ink-soft);line-height:1.5;}
.rcard .rp{display:flex;gap:7px;margin-top:11px;}
.rcard .rp .rphoto{position:relative;width:54px;height:54px;border-radius:8px;border:1px solid var(--line);overflow:hidden;}
.rcard .rp .rphoto .lbl{font-size:8px;padding:2px 4px;}

/* subscription cta */
.subcta{display:grid;grid-template-columns:1.2fr 1fr;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:var(--clay-wash);}
@media(max-width:760px){.subcta{grid-template-columns:1fr;}}
.subcta .sc-t{padding:40px;}
.subcta .sc-t h3{font-family:'Playfair Display',serif;font-weight:500;font-size:30px;letter-spacing:-.01em;}
.subcta .sc-t p{color:oklch(0.42 0.05 47);margin:12px 0 22px;max-width:38ch;}
.subcta .sc-media{position:relative;min-height:220px;}

/* trust strip row */
.trust-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:30px;}
@media(max-width:760px){.trust-row{grid-template-columns:repeat(2,1fr);}}
.trust-row .tr{display:flex;gap:12px;align-items:flex-start;padding:18px;background:var(--card);border:1px solid var(--line);border-radius:12px;}
.trust-row .tr .ic{width:38px;height:38px;border-radius:10px;background:var(--green-wash);color:var(--green);display:grid;place-items:center;flex:none;}
.trust-row .tr .tt{font-weight:600;font-size:14px;}
.trust-row .tr .td{font-size:12.5px;color:var(--ink-faint);margin-top:2px;}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14.5px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:80;display:flex;align-items:center;gap:10px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* cart drawer */
.cart-bg{position:fixed;inset:0;background:oklch(0.2 0.02 60 / .42);z-index:70;opacity:0;pointer-events:none;transition:.22s;}
.cart-bg.open{opacity:1;pointer-events:auto;}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;background:var(--paper);z-index:71;transform:translateX(100%);transition:.26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);}
.cart-drawer.open{transform:translateX(0);}
@media(max-width:520px){.cart-drawer{width:100%;top:auto;height:90vh;border-radius:18px 18px 0 0;transform:translateY(100%);}.cart-drawer.open{transform:translateY(0);}}
.cd-head{display:flex;align-items:center;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line);}
.cd-head h3{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;}
.cd-head .cnt{font-size:13px;color:var(--ink-faint);}
.cd-head .dclose{margin-left:auto;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-soft);}
.cd-head .dclose:hover{background:var(--paper-2);}
.cd-free{padding:14px 22px;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink-soft);}
.cd-free b{color:var(--ink);}
.cd-free .track{height:6px;border-radius:6px;background:var(--paper-2);overflow:hidden;margin-top:8px;}
.cd-free .fill{height:100%;background:linear-gradient(90deg,var(--green-soft),var(--green));border-radius:6px;transition:width .3s;}
.cd-body{flex:1;overflow-y:auto;padding:8px 22px;}
.cd-item{display:flex;gap:13px;padding:16px 0;border-bottom:1px solid var(--line);}
.cd-item:last-child{border-bottom:none;}
.cd-item .im{width:62px;height:78px;border-radius:9px;flex:none;position:relative;overflow:hidden;border:1px solid var(--line);}
.cd-item .ii{flex:1;min-width:0;}
.cd-item .ii .nm{font-weight:600;font-size:14.5px;}
.cd-item .ii .mt{font-size:12px;color:var(--ink-faint);margin:1px 0 9px;}
.cd-item .ii .bot{display:flex;align-items:center;gap:11px;}
.cd-qty{display:flex;align-items:center;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;}
.cd-qty button{width:28px;height:28px;display:grid;place-items:center;font-size:15px;color:var(--ink-soft);}
.cd-qty button:hover{background:var(--green-wash);color:var(--green);}
.cd-qty .qn{min-width:26px;text-align:center;font-weight:600;font-size:13px;font-variant-numeric:tabular-nums;}
.cd-item .rm{font-size:12.5px;color:var(--ink-faint);}
.cd-item .rm:hover{color:var(--clay);}
.cd-item .pp{margin-left:auto;text-align:right;font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;flex:none;}
.cd-empty{text-align:center;padding:60px 20px;}
.cd-empty .ring{width:76px;height:76px;border-radius:50%;background:var(--green-wash);color:var(--green);display:grid;place-items:center;margin:0 auto 16px;}
.cd-empty h4{font-size:18px;font-weight:600;margin-bottom:6px;}
.cd-empty p{color:var(--ink-soft);font-size:14px;margin-bottom:18px;}
.cd-foot{border-top:1px solid var(--line);padding:18px 22px;background:var(--card);}
.cd-foot .earn{display:flex;align-items:center;gap:8px;background:var(--clay-wash);border-radius:10px;padding:9px 12px;font-size:12.5px;color:oklch(0.45 0.08 47);margin-bottom:12px;}
.cd-foot .earn b{color:var(--clay);}
.cd-foot .totrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.cd-foot .totrow .l{font-size:14px;color:var(--ink-soft);}
.cd-foot .totrow .p{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;}
.cd-foot .btn-primary{width:100%;height:52px;}
.cd-foot .cont{display:block;text-align:center;margin-top:10px;font-size:13.5px;color:var(--green);text-decoration:none;font-weight:600;}

/* search overlay */
.search-bg{position:fixed;inset:0;background:oklch(0.2 0.02 60 / .4);z-index:70;opacity:0;pointer-events:none;transition:.2s;}
.search-bg.open{opacity:1;pointer-events:auto;}
.search-panel{position:fixed;top:0;left:0;right:0;background:var(--paper);z-index:71;transform:translateY(-100%);transition:.26s cubic-bezier(.4,0,.2,1);padding:22px 24px 28px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;}
.search-panel.open{transform:translateY(0);}
.search-in{max-width:780px;margin:0 auto;}
.search-field{display:flex;align-items:center;gap:13px;border:1px solid var(--line-strong);border-radius:14px;padding:0 16px;height:58px;background:var(--card);}
.search-field svg{color:var(--ink-faint);flex:none;}
.search-field input{flex:1;border:none;background:none;outline:none;font-size:18px;color:var(--ink);}
.search-field .sx{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--ink-soft);flex:none;}
.search-field .sx:hover{background:var(--paper-2);}
.search-sect{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin:22px 0 11px;}
.search-pop{display:flex;gap:8px;flex-wrap:wrap;}
.search-pop button{display:inline-flex;align-items:center;gap:8px;padding:8px 15px;border-radius:30px;border:1px solid var(--line-strong);background:var(--card);font-size:13.5px;font-weight:600;transition:.15s;}
.search-pop button:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.search-pop .pdot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:inset 0 0 0 1px oklch(0 0 0 / .08);}
.sres{display:flex;flex-direction:column;gap:4px;}
.sres a{display:flex;gap:13px;align-items:center;padding:10px;border-radius:12px;text-decoration:none;color:inherit;}
.sres a:hover{background:var(--paper-2);}
.sres .sm{width:48px;height:58px;border-radius:8px;flex:none;position:relative;overflow:hidden;border:1px solid var(--line);}
.sres .si{flex:1;min-width:0;}
.sres .si .nn{font-weight:600;font-size:15px;}
.sres .si .cc{font-size:12.5px;color:var(--ink-faint);}
.sres .pp{font-weight:700;font-variant-numeric:tabular-nums;flex:none;}
.search-empty{text-align:center;color:var(--ink-faint);padding:30px;font-size:14.5px;}


</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="home.jsx"></script>
</body>
</html>
